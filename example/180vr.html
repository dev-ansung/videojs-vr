<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>180 VR Player</title>
    <link href="https://cdn.jsdelivr.net/npm/video.js@8.23.7/dist/video-js.min.css" rel="stylesheet">
    <link href="../dist/videojs-vr.css" rel="stylesheet">
</head>

<body>
    <input type="file" id="media-input" accept="video/*">
    <br><br>

    <video id="player" class="video-js vjs-default-skin" width="640" height="360" controls playsinline></video>

    <script src="https://cdn.jsdelivr.net/npm/video.js@8.23.7/dist/video.min.js"></script>
    <script src="../dist/videojs-vr.js"></script>
    <script>
        const player = videojs('player');

        // Initialize VR plugin with 180 projection
        player.vr({ projection: '180' });

        document.getElementById('media-input').addEventListener('change', function (e) {
            const file = e.target.files[0];
            if (file) {
                // Load the selected local file into the player
                player.src({
                    src: URL.createObjectURL(file),
                    type: file.type || 'video/mp4'
                });
            }
        });
    </script>
</body>

</html>
